
<h2 class="sr-only" style="position:absolute;left:-9999px">Contact Book with binary search lookup</h2>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .app { padding: 1.5rem 0; max-width: 680px; }
  .top-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 1.5rem; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { width: 100%; padding: 10px 14px 10px 38px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; transition: border 0.15s; }
  .search-wrap input:focus { border-color: var(--color-border-primary); box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.4; }
  .add-btn { padding: 9px 16px; font-size: 13px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; white-space: nowrap; transition: background 0.12s; }
  .add-btn:hover { background: var(--color-background-secondary); }

  .result-banner { padding: 10px 14px; border-radius: var(--border-radius-md); font-size: 13px; margin-bottom: 1rem; display: none; }
  .result-banner.found { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; }
  .result-banner.notfound { background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F7C1C1; }
  .result-banner.show { display: block; }

  .alpha-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1.25rem; }
  .alpha-tab { padding: 4px 9px; font-size: 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; cursor: pointer; color: var(--color-text-secondary); background: transparent; transition: all 0.12s; }
  .alpha-tab:hover { background: var(--color-background-secondary); }
  .alpha-tab.active { background: #EEEDFE; color: #534AB7; border-color: #AFA9EC; }

  .stats { display: flex; gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { flex: 1; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; }
  .stat-card .label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .stat-card .val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }

  .contact-list { display: flex; flex-direction: column; gap: 8px; }
  .group-header { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 0 2px; border-bottom: 0.5px solid var(--color-border-tertiary); margin-top: 6px; }

  .contact-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); transition: border 0.12s, background 0.12s; }
  .contact-card:hover { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
  .contact-card.highlight { border-color: #7F77DD; background: #EEEDFE; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; flex-shrink: 0; }
  .contact-info { flex: 1; min-width: 0; }
  .contact-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .contact-detail { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .delete-btn { padding: 5px 9px; font-size: 11px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; opacity: 0; transition: opacity 0.12s; }
  .contact-card:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: #FCEBEB; color: #A32D2D; border-color: #F7C1C1; }

  .empty-state { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-secondary); padding: 1.5rem; width: 360px; max-width: 90vw; }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; color: var(--color-text-primary); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .field input { width: 100%; padding: 9px 12px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
  .field input:focus { border-color: #7F77DD; box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
  .modal-actions { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }
  .btn-cancel { padding: 8px 14px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; cursor: pointer; color: var(--color-text-secondary); }
  .btn-save { padding: 8px 16px; font-size: 13px; border: 0.5px solid #AFA9EC; border-radius: var(--border-radius-md); background: #EEEDFE; color: #534AB7; cursor: pointer; font-weight: 500; }
  .btn-save:hover { background: #CECBF6; }

  .algo-trace { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 1rem; padding: 8px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); display: none; font-family: var(--font-mono); }
  .algo-trace.show { display: block; }
</style>

<div class="app">
  <div class="top-bar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Binary search by name…" autocomplete="off" />
    </div>
    <button class="add-btn" onclick="openModal()">+ Add contact</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="label">Total contacts</div><div class="val" id="totalCount">0</div></div>
    <div class="stat-card"><div class="label">Search steps</div><div class="val" id="stepsCount">—</div></div>
    <div class="stat-card"><div class="label">Algorithm</div><div class="val" style="font-size:13px;padding-top:4px">Binary</div></div>
  </div>

  <div id="resultBanner" class="result-banner"></div>
  <div id="algoTrace" class="algo-trace"></div>

  <div class="alpha-tabs" id="alphaTabs"></div>

  <div class="contact-list" id="contactList"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h3>Add contact</h3>
    <div class="field"><label>Full name *</label><input type="text" id="fName" placeholder="Jane Smith" /></div>
    <div class="field"><label>Phone</label><input type="text" id="fPhone" placeholder="+91 98765 43210" /></div>
    <div class="field"><label>Email</label><input type="text" id="fEmail" placeholder="jane@example.com" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addContact()">Save contact</button>
    </div>
  </div>
</div>

<script>
const AVATAR_COLORS = [
  ['#EEEDFE','#534AB7'],['#E1F5EE','#0F6E56'],['#FAECE7','#993C1D'],
  ['#FBEAF0','#993556'],['#E6F1FB','#185FA5'],['#EAF3DE','#3B6D11'],
  ['#FAEEDA','#854F0B'],
];

let contacts = [
  {name:'Aarav Mehta',phone:'+91 98100 11223',email:'aarav@example.com'},
  {name:'Bhavna Sharma',phone:'+91 99200 22334',email:'bhavna@example.com'},
  {name:'Chetan Gupta',phone:'+91 97300 33445',email:'chetan@example.com'},
  {name:'Deepika Patel',phone:'+91 96400 44556',email:'deepika@example.com'},
  {name:'Esha Joshi',phone:'+91 95500 55667',email:'esha@example.com'},
  {name:'Farhan Khan',phone:'+91 94600 66778',email:'farhan@example.com'},
  {name:'Gita Rao',phone:'+91 93700 77889',email:'gita@example.com'},
  {name:'Harish Nair',phone:'+91 92800 88990',email:'harish@example.com'},
  {name:'Ishaan Verma',phone:'+91 91900 99001',email:'ishaan@example.com'},
  {name:'Jyoti Singh',phone:'+91 90010 00112',email:'jyoti@example.com'},
  {name:'Karan Malhotra',phone:'+91 89120 11223',email:'karan@example.com'},
  {name:'Lavanya Iyer',phone:'+91 88230 22334',email:'lavanya@example.com'},
  {name:'Manish Bose',phone:'+91 87340 33445',email:'manish@example.com'},
  {name:'Nisha Trivedi',phone:'+91 86450 44556',email:'nisha@example.com'},
  {name:'Om Prakash',phone:'+91 85560 55667',email:'om@example.com'},
  {name:'Priya Kapoor',phone:'+91 84670 66778',email:'priya@example.com'},
  {name:'Rahul Desai',phone:'+91 83780 77889',email:'rahul@example.com'},
  {name:'Sneha Kulkarni',phone:'+91 82890 88990',email:'sneha@example.com'},
  {name:'Tarun Srivastava',phone:'+91 81900 99001',email:'tarun@example.com'},
  {name:'Uma Pandey',phone:'+91 80010 00112',email:'uma@example.com'},
];

let activeFilter = null;
let highlightedName = null;

function getInitials(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}
function getAvatarColor(name) {
  let idx = 0;
  for(let c of name) idx = (idx + c.charCodeAt(0)) % AVATAR_COLORS.length;
  return AVATAR_COLORS[idx];
}

function sortContacts() {
  contacts.sort((a,b) => a.name.localeCompare(b.name));
}

function binarySearch(name) {
  sortContacts();
  let lo = 0, hi = contacts.length - 1;
  const steps = [];
  const query = name.trim().toLowerCase();
  while(lo <= hi) {
    const mid = Math.floor((lo+hi)/2);
    const midName = contacts[mid].name.toLowerCase();
    steps.push(`Step ${steps.length+1}: Check index ${mid} → "${contacts[mid].name}"`);
    if(midName === query) { return { found: true, index: mid, steps, contact: contacts[mid] }; }
    else if(midName < query) { lo = mid + 1; steps[steps.length-1] += ' → search right'; }
    else { hi = mid - 1; steps[steps.length-1] += ' → search left'; }
  }
  return { found: false, index: -1, steps, contact: null };
}

function getUniqueFirstLetters() {
  const letters = [...new Set(contacts.map(c=>c.name[0].toUpperCase()))].sort();
  return letters;
}

function renderAlphaTabs() {
  const tabs = document.getElementById('alphaTabs');
  const letters = getUniqueFirstLetters();
  tabs.innerHTML = `<button class="alpha-tab${activeFilter===null?' active':''}" onclick="setFilter(null)">All</button>` +
    letters.map(l=>`<button class="alpha-tab${activeFilter===l?' active':''}" onclick="setFilter('${l}')">${l}</button>`).join('');
}

function setFilter(l) {
  activeFilter = l;
  highlightedName = null;
  document.getElementById('searchInput').value = '';
  clearBanner();
  renderAlphaTabs();
  renderList();
}

function getDisplayContacts() {
  sortContacts();
  if(!activeFilter) return contacts;
  return contacts.filter(c=>c.name[0].toUpperCase()===activeFilter);
}

function renderList() {
  const list = document.getElementById('contactList');
  const displayed = getDisplayContacts();
  document.getElementById('totalCount').textContent = contacts.length;

  if(displayed.length === 0) {
    list.innerHTML = '<div class="empty-state">No contacts found.</div>';
    return;
  }

  let html = '';
  let lastLetter = '';
  for(const c of displayed) {
    const letter = c.name[0].toUpperCase();
    if(letter !== lastLetter) {
      html += `<div class="group-header">${letter}</div>`;
      lastLetter = letter;
    }
    const [bg, fg] = getAvatarColor(c.name);
    const initials = getInitials(c.name);
    const isHL = highlightedName === c.name;
    html += `
      <div class="contact-card${isHL?' highlight':''}">
        <div class="avatar" style="background:${bg};color:${fg}">${initials}</div>
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          <div class="contact-detail">${c.phone}${c.email?' · '+c.email:''}</div>
        </div>
        <button class="delete-btn" onclick="deleteContact('${c.name.replace(/'/g,"\\'")}')">Remove</button>
      </div>`;
  }
  list.innerHTML = html;
}

function clearBanner() {
  const b = document.getElementById('resultBanner');
  b.className = 'result-banner';
  b.textContent = '';
  document.getElementById('algoTrace').className = 'algo-trace';
  document.getElementById('stepsCount').textContent = '—';
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  if(!q) {
    clearBanner();
    highlightedName = null;
    activeFilter = null;
    renderAlphaTabs();
    renderList();
    return;
  }
  searchTimer = setTimeout(()=>doSearch(q), 200);
});

function doSearch(q) {
  const res = binarySearch(q);
  const banner = document.getElementById('resultBanner');
  const trace = document.getElementById('algoTrace');

  document.getElementById('stepsCount').textContent = res.steps.length;
  trace.innerHTML = res.steps.join('<br>');
  trace.className = 'algo-trace show';
  activeFilter = null;
  renderAlphaTabs();

  if(res.found) {
    highlightedName = res.contact.name;
    banner.className = 'result-banner found show';
    banner.textContent = `Found "${res.contact.name}" in ${res.steps.length} step${res.steps.length!==1?'s':''} (binary search)`;
  } else {
    highlightedName = null;
    banner.className = 'result-banner notfound show';
    banner.textContent = `No exact match for "${q}" after ${res.steps.length} step${res.steps.length!==1?'s':''}. Try typing the full name.`;
  }
  renderList();
  if(res.found) {
    setTimeout(()=>{
      const hl = document.querySelector('.contact-card.highlight');
      if(hl) hl.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 100);
  }
}

function openModal() {
  document.getElementById('fName').value='';
  document.getElementById('fPhone').value='';
  document.getElementById('fEmail').value='';
  document.getElementById('modalOverlay').className='modal-overlay open';
  setTimeout(()=>document.getElementById('fName').focus(),50);
}
function closeModal() {
  document.getElementById('modalOverlay').className='modal-overlay';
}
function closeModalOnBg(e) {
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

function addContact() {
  const name = document.getElementById('fName').value.trim();
  if(!name) { document.getElementById('fName').focus(); return; }
  contacts.push({
    name,
    phone: document.getElementById('fPhone').value.trim() || '—',
    email: document.getElementById('fEmail').value.trim() || ''
  });
  sortContacts();
  closeModal();
  highlightedName = null;
  clearBanner();
  activeFilter = null;
  renderAlphaTabs();
  renderList();
}

function deleteContact(name) {
  contacts = contacts.filter(c=>c.name!==name);
  if(highlightedName===name) { highlightedName=null; clearBanner(); }
  renderAlphaTabs();
  renderList();
}

sortContacts();
renderAlphaTabs();
renderList();
</script>
